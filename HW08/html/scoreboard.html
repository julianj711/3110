<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scoreboard</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>
        <h1>Scoreboard</h1>

        <table id="scoreboard">
                <thead>
                <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Score</th>
                        <th>Last Modified By</th>
                </tr>
                </thead>
                <tbody id="scoreboardBody">
                </tbody>
        </table>
        
        <button onclick="enterFullScreen()">FullScreen</button>
        <button onclick="window.location.href='login.html?redirect=index.html'">Edit Scoreboard</button>
        <button onclick="requestNotificationPermission()">Enable Score Notifications</button>
        <button onclick="window.location.href='login.html?redirect=register.html'">Create Credentials</button>
        
        <script src="loadScoreboard.js"></script>
</body>
</html>
