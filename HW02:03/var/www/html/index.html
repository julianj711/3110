<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <h2>View All Items</h2>
        <a href="/api/">Get All Items</a>

        <h2>Get Item By Index</h2>
        <form action="/api" method="GET">
                <input type="number" name="index" placeholder="Enter index">
                <button type="submit">Get Item</button>
        </form>

        <h2>Add Item</h2>
        <form action="/api" method="POST">
                <input type="text" name="item" placeholder="Enter item">
                <button type="submit">Add Item</button>
        </form>
</body>
</html>
